        async function listarArchivos() {

            listDiv.innerHTML = '';
            
            response.result.entries.forEach(file => {
                if (file.name.endsWith('.pdf')) {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <strong>${file.name}</strong><br><br>
                        <button onclick="eliminarUltimaPagina('${file.path_display}')">Eliminar última página y sincronizar</button>
                    `;

                }
            });

        async function eliminarUltimaPagina(path) {
            alert('Procesando... esto actualizará el archivo original en Dropbox.');
            // 1. Descargar
            const download = await dbx.filesDownload({path: path});
            const blob = download.result.fileBlob;
            
            // 2. Editar PDF
            const pdfDoc = await PDFLib.PDFDocument.load(await blob.arrayBuffer());
            const pageCount = pdfDoc.getPageCount();
            if (pageCount > 1) {
                pdfDoc.removePage(pageCount - 1);
            }
            
            // 3. Guardar y Subir
            const pdfBytes = await pdfDoc.save();
            await dbx.filesUpload({
                path: path,
                contents: pdfBytes,
                mode: 'overwrite'
            });
            alert('¡Listo! Archivo actualizado.');
            listarArchivos();
        }

        listarArchivos();
