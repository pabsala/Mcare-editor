<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor PDF Permanente</title>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/dropbox/dist/Dropbox-sdk.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; }
        .header { background: #007aff; color: white; padding: 20px; text-align: center; }
        .card { background: white; padding: 15px; border-radius: 12px; margin: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        button { background: #007aff; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; }
        .error-msg { color: #d32f2f; background: #fdecea; padding: 10px; margin: 15px; border-radius: 8px; font-size: 14px; display: none; }
    </style>
</head>
<body>
    <div class="header"><h1>Mis Reportes Médicos</h1></div>
    <div id="error-display" class="error-msg"></div>
    <div id="file-list" style="padding: 10px;">Iniciando conexión segura...</div>

    <script>
        const APP_KEY = 'gjgucqwqop2q06x';
        const APP_SECRET = 'k44t41hc7whaaue';
        // RECUERDA: Este debe ser el Refresh Token largo obtenido tras el intercambio
        const REFRESH_TOKEN = 'o82Zg_Ulhb0AAAAAAAAKT-GXaklCoZqFa5k-CM13XqY'; 

        let accessToken = "";

        async function renovarLlave() {
            const params = new URLSearchParams({
                'grant_type': 'refresh_token',
                'refresh_token': REFRESH_TOKEN,
                'client_id': APP_KEY,
                'client_secret': APP_SECRET
            });

            const response = await fetch('https://api.dropbox.com/oauth2/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error_description || data.error);
            return data.access_token;
        }

        async function iniciarApp() {
            const listDiv = document.getElementById('file-list');
            const errorDiv = document.getElementById('error-display');
            
            try {
                accessToken = await renovarLlave();
                const dbx = new Dropbox.Dropbox({ accessToken: accessToken });
                
                const res = await dbx.filesListFolder({ path: '' });
                listDiv.innerHTML = '';
                errorDiv.style.display = 'none';

                // Corrección: Filtro insensible a mayúsculas
                const pdfs = res.result.entries.filter(f => f.name.toLowerCase().endsWith('.pdf'));

                if (pdfs.length === 0) {
                    listDiv.innerText = "No se encontraron archivos PDF.";
                    return;
                }

                pdfs.forEach(file => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<strong>${file.name}</strong>
                                     <button onclick="editar('${file.path_display}')">Quitar última página</button>`;
                    listDiv.appendChild(card);
                });
            } catch (e) {
                listDiv.innerText = "Error de conexión.";
                errorDiv.innerText = "Detalle técnico: " + e.message;
                errorDiv.style.display = 'block';
            }
        }

        async function editar(path) {
            try {
                const dbx = new Dropbox.Dropbox({ accessToken: accessToken });
                const res = await dbx.filesDownload({ path: path });
                const arrayBuffer = await res.result.fileBlob.arrayBuffer();
                
                const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                const pageCount = pdfDoc.getPageCount();
                
                if (pageCount > 1) {
                    pdfDoc.removePage(pageCount - 1);
                    const pdfBytes = await pdfDoc.save();
                    
                    await dbx.filesUpload({ 
                        path: path, 
                        contents: pdfBytes, 
                        mode: 'overwrite' 
                    });
                    alert('¡Documento sincronizado correctamente!');
                    iniciarApp();
                } else {
                    alert('El documento tiene solo una página.');
                }
            } catch (e) {
                alert('Fallo al editar: ' + e.message);
            }
        }

        iniciarApp();
    </script>
</body>
</html>
