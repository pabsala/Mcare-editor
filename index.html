        async function listar() {
            try {
                const res = await dbx.filesListFolder({ path: '' });
                document.getElementById('status').style.display = 'none';
                const list = document.getElementById('file-list');
                list.innerHTML = '';
                res.result.entries.filter(e => e.name.toLowerCase().endsWith('.pdf')).forEach(f => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<span class="file-name">${f.name}</span><button onclick="editar('${f.path_display}')">Quitar última página</button>`;
                    list.appendChild(card);
                });
            } catch (e) { document.getElementById('status').innerText = 'Error: Revisa tu Token.'; }
        }
        async function editar(path) {
            if (!confirm('¿Eliminar la última página?')) return;
            const res = await dbx.filesDownload({ path: path });
            const pdf = await PDFLib.PDFDocument.load(await res.result.fileBlob.arrayBuffer());
            if (pdf.getPageCount() > 1) {
                pdf.removePage(pdf.getPageCount() - 1);
                const bytes = await pdf.save();
                await dbx.filesUpload({ path: path, contents: bytes, mode: 'overwrite' });
                alert('¡Actualizado!');
                listar();
            } else { alert('Solo tiene 1 página.'); }
        }
        listar();
